<!DOCTYPE html> <html>
<head><meta name='viewport' content='width=device-width, initial-scale=1.0, user-scalable=no'>
<title>pypilot mfd alarms</title>
<link rel='stylesheet' type='text/css' href='styles.css'>
</head>
<body>
  <div class='container'>
      <h1>Alarms Configuration</h1>
      <div class='box'>
          <div class='col2-grid'>
            <input type='checkbox' id='anchor_alarm'><label for='anchor_alarm'>Anchor Alarm</label>
            <span>Radius (m)</span><input type='number' id='anchor_alarm_distance' style='width: 4em;' min=1 max=100>
          </div>
      </div>
      <div class='box'>
        <div class='col2-grid'>
          <input type='checkbox' id='course_alarm'><label for='course_alarm'>Course Alarm</label>          
          <span>Course Degrees</span><input type='number' id='course_alarm_course' style='width: 4em;' min=0 max=360>
          <span>Error Degrees</span><input type='number' id='course_alarm_error' style='width: 4em;' min=0 max=360>
        </div>
      </div>
      <div class='box'>
        <div class='col2-grid'>
          <input type='checkbox' id='gps_speed_alarm'><label for='gps_speed_alarm'>GPS Speed Alarm</label>          
          <span>Min</span><input type='number' id='gps_min_speed_alarm_knots' style='width: 4em;' min=0 max=100>
          <span>Max</span><input type='number' id='gps_max_speed_alarm_knots' style='width: 4em;' min=1 max=100>
        </div>
      </div>
      <div class='box'>
        <div class='col2-grid'>
          <input type='checkbox' id='wind_speed_alarm'><label for='wind_speed_alarm'>Wind Speed Alarm</label>          
          <span>Min</span><input type='number' id='wind_min_speed_alarm_knots' style='width: 4em;' min=0 max=100>
          <span>Max</span><input type='number' id='wind_max_speed_alarm_knots' style='width: 4em;' min=1 max=100>
        </div>
      </div>
      <div class='box'>
        <div class='col2-grid'>
          <input type='checkbox' id='water_speed_alarm'><label for='water_speed_alarm'>Water Speed Alarm</label>          
          <span>Min</span><input type='number' id='water_min_speed_alarm_knots' style='width: 4em;' min=0 max=100>
          <span>Max</span><input type='number' id='water_max_speed_alarm_knots' style='width: 4em;' min=1 max=100>
        </div>
      </div>
      <div class='box'>
        <h2>Weather Alarm</h2>
        <div class='col2-grid'>
          <input type='checkbox' id='weather_alarm_pressure'><label for='weather_alarm_pressure'>Pressure</label>
          <span>Min (mbar)</span><input type='number' id='weather_alarm_min_pressure' style='width: 4em;' min=900 max=1100>
          <input type='checkbox' id='weather_alarm_pressure_rate'><label for='weather_alarm_pressure_rate'>Pressure Rate (falling mbar/min)</label>
          <span>Falling Rate (mbar/min)</span><input type='number' id='weather_alarm_pressure_rate_value' style='width: 4em;' min=1 max=100>
          <input type='checkbox' id='weather_alarm_lightning'><label for='weather_alarm_lightning'>Lightning</label>
          <span>Distance (NMi)</span><input type='number' id='weather_alarm_lightning_distance' style='width: 4em;' min=1 max=100>
        </div>
      </div>
      <div class='box'>
        <div class='col2-grid'>
          <input type='checkbox' id='depth_alarm'><label for='depth_alarm'>Depth Alarm</label>
          <span>Min Depth (m)</span><input type='number' id='depth_alarm_min' style='width: 4em;' min=1 max=200>
          <input type='checkbox' id='depth_alarm_rate'><label for='depth_alarm_rate'>Depth Alarm Rate</label>
          <span>rate (m/min)</span><input type='number' id='depth_alarm_rate_value' style='width: 4em;' min=1 max=100>
        </div>
      </div>
      <div class='box'>
        <div class='col2-grid'>
          <input type='checkbox' id='ais_alarm'><label for='ais_alarm'>AIS Alarm</label>
          <span>CPA</span><input type='number' id='ais_alarm_cpa' style='width: 4em;' min=1 max=30>
          <span>TCPA</span><input type='number' id='ais_alarm_tcpa' style='width: 4em;' min=1 max=100>
        </div>
      </div>
      <div class='box'>
        <div class='col2-grid'>
          <input type='checkbox' id='pypilot_alarm_noconnection'><label for='pypilot_alarm_noconnection'>pypilot alarm no connection</label>
          <input type='checkbox' id='pypilot_alarm_fault'><label for='pypilot_alarm_fault'>pypilot alarm fault</label>
          <input type='checkbox' id='pypilot_alarm_no_imu'><label for='pypilot_alarm_no_imu'>pypilot alarm no IMU</label>
          <input type='checkbox' id='pypilot_alarm_no_motor_controller'><label for='pypilot_alarm_no_motor_controller'>pypilot alarm no motor controller</label>
          <input type='checkbox' id='pypilot_alarm_lost_mode'><label for='pypilot_alarm_lost_mode'>pypilot alarm lost mode</label>
        </div>
      </div>

        <input class='button' type='button' value='Submit' onclick='on_alarm_settings()'>
  </div>
<h5>pypilot multi-function display version <span id='version'></span></h5>
<h5>written by Sean D'Epagnier</h5>
</body>
<script type='text/javascript' src='mfd.js'></script>
</html>
