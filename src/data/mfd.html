          <input class='button' type='button' onclick='cmd("display_auto")' style='width: 100%' value='Auto-enable pages'>

        <div class='col1-grid' id='display_pages'>

        </div>
        <div class='col3-grid'>
          <div> </div>

    <div class='box'>
      <h2>Display</h2>
        <div class='col1-grid'>
          <span><input type='checkbox' id='use_360'>

          <span><input type='checkbox' id='use_fahrenheit'>

          <span><input type='checkbox' id='use_inHg'>

          <span><input type='checkbox' id='use_depthft'>
